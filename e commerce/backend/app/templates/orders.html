{% extends 'base.html' %}

{% block title %}My Orders - AuraShop{% endblock %}

{% block content %}
<h1 class="text-gradient" style="margin-bottom: 2rem;">Order History & Tracking</h1>

<div id="orders-empty-panel" style="display:none;" class="glass-panel">
    <div style="text-align:center; padding:4rem 2rem;">
        <span style="font-size:4rem;">📦</span>
        <h3 style="margin-top:1.5rem; margin-bottom:1rem;">No Orders Placed Yet</h3>
        <p style="color:var(--text-secondary); margin-bottom:2rem;">Your completed checkouts will be cataloged and tracked here.</p>
        <a href="/products" class="btn btn-primary">Browse Catalog</a>
    </div>
</div>

<div id="orders-list-container" style="display:flex; flex-direction:column; gap:2rem;">
    <!-- Loaded via JS -->
    <div class="loader-container"><div class="loader"></div></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    document.addEventListener('sessionLoaded', async (e) => {
        if (!e.detail) {
            window.location.href = '/login?next=/orders';
            return;
        }
        await loadUserOrders();
    });
});

async function loadUserOrders() {
    const container = document.getElementById('orders-list-container');
    const emptyPanel = document.getElementById('orders-empty-panel');
    
    container.innerHTML = '<div class="loader-container"><div class="loader"></div></div>';
    
    const res = await API.get('/api/orders');
    if (res.error) {
        container.innerHTML = `<p style="color:var(--danger); text-align:center;">Failed to load order history: ${res.error}</p>`;
        return;
    }
    
    const orders = res.data;
    if (orders.length === 0) {
        emptyPanel.style.display = 'block';
        container.style.display = 'none';
        return;
    }
    
    emptyPanel.style.display = 'none';
    container.style.display = 'flex';
    
    container.innerHTML = orders.map(order => {
        const isCancellable = ['Pending', 'Confirmed'].includes(order.status);
        const dateFormatted = new Date(order.created_at).toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });
        
        // Tracking logic definitions
        const steps = ['Pending', 'Packed', 'Shipped', 'Delivered'];
        let activeIdx = 0; // default Pending
        
        if (order.status === 'Confirmed' || order.status === 'Packed') activeIdx = 1;
        else if (order.status === 'Shipped' || order.status === 'Out for Delivery') activeIdx = 2;
        else if (order.status === 'Delivered') activeIdx = 3;
        
        // Progress bar width
        const progressWidths = ['0%', '33%', '66%', '100%'];
        const progressPct = progressWidths[activeIdx];
        
        // HTML templates for items
        const itemsHtml = order.items.map(item => `
            <div class="order-item-row">
                <span>${item.product_name} <strong>x${item.quantity}</strong></span>
                <span>${App.formatCurrency(item.price_at_purchase)} each</span>
            </div>
        `).join('');
        
        // Custom header/badge class
        let statusBadgeClass = 'status-pending';
        if (order.status === 'Confirmed') statusBadgeClass = 'status-confirmed';
        else if (order.status === 'Packed') statusBadgeClass = 'status-packed';
        else if (order.status === 'Shipped') statusBadgeClass = 'status-shipped';
        else if (order.status === 'Out for Delivery') statusBadgeClass = 'status-out_for_delivery';
        else if (order.status === 'Delivered') statusBadgeClass = 'status-delivered';
        else if (order.status === 'Cancelled') statusBadgeClass = 'status-cancelled';

        return `
            <div class="order-card glass-panel">
                <div class="order-header">
                    <div>
                        <strong style="font-size:1.05rem;">ID: ${order.id}</strong>
                        <div style="font-size:0.8rem; color:var(--text-muted); margin-top:0.25rem;">Placed on: ${dateFormatted}</div>
                    </div>
                    <span class="status-badge ${statusBadgeClass}">${order.status}</span>
                </div>
                
                <div class="order-body">
                    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:2rem;">
                        <!-- Items & Address Info -->
                        <div>
                            <h4 style="margin-bottom:0.75rem; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:0.25rem;">Products</h4>
                            <div class="order-items-list">
                                ${itemsHtml}
                            </div>
                            
                            <h4 style="margin-top:1.5rem; margin-bottom:0.5rem; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:0.25rem;">Shipping Details</h4>
                            <div style="font-size:0.9rem; color:var(--text-secondary); line-height:1.5;">
                                <strong>Recipient:</strong> ${order.customer_name} | Contact: ${order.mobile_number}<br>
                                <strong>Address:</strong> ${order.delivery_address}, ${order.city}, ${order.state} - ${order.pin_code}
                            </div>
                        </div>
                        
                        <!-- Billing Stats -->
                        <div style="border-left:1px solid var(--border-color); padding-left:2rem; display:flex; flex-direction:column; justify-content:space-between;">
                            <div>
                                <h4 style="margin-bottom:0.5rem;">Billing</h4>
                                <div style="font-size:0.9rem; color:var(--text-secondary);">
                                    Method: ${order.payment_method} (${order.payment_status})
                                </div>
                                <div style="font-size:1.5rem; font-weight:800; margin-top:1rem;" class="text-gradient">
                                    Total: ${App.formatCurrency(order.total_amount)}
                                </div>
                            </div>
                            
                            ${isCancellable ? `
                                <button type="button" class="btn btn-danger" style="padding:0.5rem 1rem; font-size:0.85rem; width:100%; margin-top:1.5rem;" onclick="cancelUserOrder('${order.id}')">
                                    ✕ Cancel Order
                                </button>
                            ` : ''}
                        </div>
                    </div>
                    
                    <!-- Real-time Order Tracking Stepper (hide if Cancelled) -->
                    ${order.status !== 'Cancelled' ? `
                        <div class="tracking-stepper">
                            <div class="step-bar" style="width: ${progressPct};"></div>
                            
                            <div class="step-node ${activeIdx >= 0 ? (activeIdx > 0 ? 'completed' : 'active') : ''}">
                                <div class="step-bullet">${activeIdx > 0 ? '✓' : '1'}</div>
                                <div class="step-label">Ordered</div>
                            </div>
                            <div class="step-node ${activeIdx >= 1 ? (activeIdx > 1 ? 'completed' : 'active') : ''}">
                                <div class="step-bullet">${activeIdx > 1 ? '✓' : '2'}</div>
                                <div class="step-label">Packed</div>
                            </div>
                            <div class="step-node ${activeIdx >= 2 ? (activeIdx > 2 ? 'completed' : 'active') : ''}">
                                <div class="step-bullet">${activeIdx > 2 ? '✓' : '3'}</div>
                                <div class="step-label">Shipped</div>
                            </div>
                            <div class="step-node ${activeIdx >= 3 ? (activeIdx > 3 ? 'completed' : 'active') : ''}">
                                <div class="step-bullet">${activeIdx > 3 ? '✓' : '4'}</div>
                                <div class="step-label">Delivered</div>
                            </div>
                        </div>
                    ` : `
                        <div class="glass-panel" style="margin-top:2rem; padding:1rem; border-radius:var(--radius-sm); border:1px solid rgba(239, 68, 68, 0.2); text-align:center; background:rgba(239, 68, 68, 0.02); color:var(--danger); font-weight:600;">
                            ✕ This order has been cancelled and inventory quantities refunded.
                        </div>
                    `}
                </div>
            </div>
        `;
    }).join('');
}

async function cancelUserOrder(orderId) {
    if (!confirm(`Are you absolutely sure you want to cancel order ${orderId}? This will restore stock values.`)) return;
    
    const res = await API.put(`/api/orders/${orderId}`, { status: 'Cancelled' });
    if (res.error) {
        Toast.error(res.error);
    } else {
        Toast.success('Order cancelled successfully.');
        await loadUserOrders();
    }
}
</script>
{% endblock %}
