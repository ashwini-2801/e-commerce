{% extends 'base.html' %}

{% block title %}Sign In - AuraShop{% endblock %}

{% block content %}
<div class="auth-container glass-panel">
    <div class="auth-header">
        <h2 class="text-gradient">Welcome Back</h2>
        <p>Log in to access your cart, track orders, and view history.</p>
    </div>
    
    <form id="login-form">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required class="form-control" placeholder="name@example.com">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required class="form-control" placeholder="••••••••">
        </div>
        
        <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            Sign In
        </button>
    </form>
    
    <div class="auth-footer">
        Don't have an account? <a href="/register">Create one here</a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const submitBtn = document.getElementById('submit-btn');
    
    if (!email || !password) {
        Toast.error('Please enter both email and password.');
        return;
    }
    
    submitBtn.disabled = true;
    submitBtn.innerText = 'Signing In...';
    
    const res = await API.post('/api/auth/login', { email, password });
    
    submitBtn.disabled = false;
    submitBtn.innerText = 'Sign In';
    
    if (res.error) {
        Toast.error(res.error);
    } else {
        Toast.success('Login successful! Redirecting...');
        
        // Sync cart count immediately
        await App.checkSession();
        
        // Check next parameter in URL query
        const nextUrl = App.getQueryParam('next') || '/';
        setTimeout(() => {
            window.location.href = nextUrl;
        }, 1000);
    }
});
</script>
{% endblock %}
